<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RightButton Labs | <type your tagline here></title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <div class="logo-container">
            <img src="logo.png" alt="RightButton Labs Logo" class="logo">
        </div>
        <nav>
            <ul class="nav-links">
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#services">Services</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section id="home" class="hero">
        <div class="hero-content">
            <h1>Welcome to RightButton Labs</h1>
            <p><type your brief, impactful company mission or value proposition here></p>
            <a href="#contact" class="cta-button">Get in Touch</a>
        </div>
    </section>

    <section id="about" class="section bg-white">
        <h2>About Us</h2>
        <div class="container text-center">
            <p><type your company history, mission, and vision here. Describe what makes RightButton Labs unique and why clients should trust you.></p>
        </div>
    </section>

    <section id="services" class="section bg-light">
        <h2>Our Services</h2>
        <div class="container services-grid">
            <div class="service-card">
                <h3><type service 1 name></h3>
                <p><type brief description of service 1 and how it benefits your clients></p>
            </div>
            <div class="service-card">
                <h3><type service 2 name></h3>
                <p><type brief description of service 2 and how it benefits your clients></p>
            </div>
            <div class="service-card">
                <h3><type service 3 name></h3>
                <p><type brief description of service 3 and how it benefits your clients></p>
            </div>
        </div>
    </section>

    <section id="contact" class="section bg-white">
        <h2>Contact Us</h2>
        <div class="container contact-info">
            <div class="contact-item">
                <strong>Email:</strong> <br>
                <a href="mailto:<type your contact email>"><type your contact email></a>
            </div>
            <div class="contact-item">
                <strong>Phone:</strong> <br>
                <type your phone number>
            </div>
            <div class="contact-item">
                <strong>Location:</strong> <br>
                <type your physical address or city, country>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 RightButton Labs. All rights reserved.</p>
    </footer>
</body>
</html>
